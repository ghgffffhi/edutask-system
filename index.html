<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTask</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <span>📚</span>
            <span class="brand-name">EduTask</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link active">📋 งาน</a>
            <a href="goals.html" class="nav-link">🎯 เป้าหมาย</a>
        </div>
        <div class="nav-actions">
            <button id="themeToggle" onclick="toggleTheme()" class="btn-icon">🌙</button>
            <button onclick="logout()" class="btn-logout">🚪 ออกจากระบบ</button>
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="main-layout">

        <!-- Sidebar -->
        <aside class="sidebar">

            <!-- Dashboard -->
            <div class="panel">
                <p class="panel-title">ภาพรวม</p>
                <div class="dashboard">
                    <div class="stat-card">
                        <h3 id="totalTasks">0</h3>
                        <p>ทั้งหมด</p>
                    </div>
                    <div class="stat-card stat-done">
                        <h3 id="completedTasks">0</h3>
                        <p>เสร็จแล้ว</p>
                    </div>
                    <div class="stat-card stat-pending">
                        <h3 id="pendingTasks">0</h3>
                        <p>ค้างอยู่</p>
                    </div>
                </div>
                <div class="progress-box">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <p id="progressText" class="progress-text">0% เสร็จแล้ว</p>
            </div>

            <!-- Calendar -->
            <div class="panel">
                <p class="panel-title">📅 งานที่กำลังจะมาถึง</p>
                <div id="calendarPreview"></div>
            </div>

            <!-- AI Box -->
            <div class="panel ai-panel">
                <p class="panel-title">✨ AI ผู้ช่วย</p>

                <div class="apikey-row">
                    <input type="password" id="apiKeyInput" placeholder="🔑 วาง Gemini API Key ที่นี่">
                    <button onclick="saveApiKey()" class="btn-save-key">บันทึก</button>
                </div>
                <p id="apiKeyStatus" class="apikey-hint">
                    ขอ Key ฟรีได้ที่ <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a>
                </p>

                <textarea id="aiInput" placeholder="ถาม AI เช่น สรุปเรื่องแรงและการเคลื่อนที่ให้หน่อย" style="margin-top:10px"></textarea>
                <button onclick="askAI()" class="btn-ai">✨ ถาม AI</button>
                <div id="aiResponse"></div>
            </div>

        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Add Task -->
            <div class="panel">
                <p class="panel-title">➕ เพิ่มงานใหม่</p>
                <div class="task-form">
                    <input type="text" id="taskInput" placeholder="ชื่องาน...">
                    <textarea id="descriptionInput" placeholder="รายละเอียดงาน (ถ้ามี)"></textarea>
                    <div class="form-row">
                        <input type="date" id="dateInput">
                        <select id="priorityInput">
                            <option value="สูง">🔴 ด่วน</option>
                            <option value="กลาง" selected>🟡 ปกติ</option>
                            <option value="ต่ำ">🟢 ชิลๆ</option>
                        </select>
                    </div>
                    <select id="subjectInput">
                        <option value="คณิตศาสตร์">📘 คณิตศาสตร์</option>
                        <option value="ภาษาอังกฤษ">📗 ภาษาอังกฤษ</option>
                        <option value="วิทยาศาสตร์">📙 วิทยาศาสตร์</option>
                        <option value="การเขียนโปรแกรม">💻 การเขียนโปรแกรม</option>
                    </select>
                    <button onclick="addTask()" class="btn-primary">+ เพิ่มงาน</button>
                </div>
            </div>

            <!-- Search & Filter -->
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="🔍 ค้นหางาน..." onkeyup="displayTasks()">
                <select id="filterInput" onchange="displayTasks()">
                    <option value="all">📋 ทั้งหมด</option>
                    <option value="completed">✅ งานเสร็จ</option>
                    <option value="pending">⏳ งานค้าง</option>
                </select>
            </div>

            <!-- Task List -->
            <ul id="taskList"></ul>

        </main>
    </div>

    <div id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
